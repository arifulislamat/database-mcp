name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  typescript:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: conformance
          MYSQL_USER: mcp
          MYSQL_PASSWORD: mcp-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: mcp
          POSTGRES_PASSWORD: mcp-password
          POSTGRES_DB: conformance
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mcp -d conformance"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
      mariadb:
        image: mariadb:11
        env:
          MARIADB_ROOT_PASSWORD: root
          MARIADB_DATABASE: conformance
          MARIADB_USER: mcp
          MARIADB_PASSWORD: mcp-password
        ports:
          - 3307:3306
        options: >-
          --health-cmd "healthcheck.sh --connect --innodb_initialized"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      # Until the first package lands (M0.5) there is nothing to build;
      # the guard keeps this workflow green on the bare repo.
      - name: Install
        run: |
          if [ -f package.json ]; then npm ci; else echo "no package.json yet — skipping"; fi
      - name: Build
        run: |
          if [ -f package.json ]; then npm run build; else echo "skipping"; fi
      - name: Tests
        run: |
          if [ -f package.json ]; then npm test; else echo "skipping"; fi
      - name: Version sync check
        run: |
          if [ -f scripts/bump-version.mjs ]; then node scripts/bump-version.mjs --check; fi
      - name: Conformance
        run: |
          if [ -f conformance/run.mjs ]; then
            npm run conformance
          else
            echo "no conformance suite yet — skipping"
          fi
      - name: Secret leak check
        run: |
          if [ -f conformance/leak-libsql.mjs ]; then npm run leak-check; fi

  python:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: conformance
          MYSQL_USER: mcp
          MYSQL_PASSWORD: mcp-password
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h localhost"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    steps:
      - uses: actions/checkout@v7
      # Node runs the language-agnostic conformance suite.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: astral-sh/setup-uv@v6
      - name: Install
        run: |
          npm ci
          uv sync
      - name: Tests
        run: uv run pytest core/python/tests
      - name: Conformance (sqlite, stdio)
        run: node conformance/run.mjs -- uv run database-mcp-sqlite
      - name: Conformance (sqlite, http)
        run: node conformance/run.mjs --transport http -- uv run database-mcp-sqlite
      - name: Conformance (libsql)
        run: node conformance/run.mjs -- uv run database-mcp-libsql
      - name: Secret leak check (libsql)
        run: node conformance/leak-libsql.mjs -- uv run database-mcp-libsql
      - name: Conformance (mysql)
        run: node conformance/run.mjs --engine mysql -- uv run database-mcp-mysql
      - name: Secret leak check (mysql)
        run: node conformance/leak-mysql.mjs -- uv run database-mcp-mysql
